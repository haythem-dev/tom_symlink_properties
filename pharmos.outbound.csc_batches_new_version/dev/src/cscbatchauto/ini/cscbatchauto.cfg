################################################################################
#
#   configuration for logging framework log4cplus 
#
################################################################################
#
#   log level:
#     TRACE
#     DEBUG
#     INFO
#     WARN
#     ERROR
#     FATAL
#
#   logger:
#     rootLogger                    - default logger
#
#   appender types:
#     log4cplus::ConsoleAppender    - send msg to console (stdout)
#     log4cplus::FileAppender       - send msg to file
#     log4cplus::Win32DebugAppender - send msg to debugger
#     log4cplus::NullAppender       - send msg to /dev/null
#
#   appender instances:
#     APPEND_INSPECT                - real life environment: for individually selected messages 
#     APPEND_STANDARD               - real life environment: for standard application messages
#     APPEND_ERROR                  - real life environment: for error messages 
#     APPEND_DEBUGGER               - test environment     : for developping & debugging purpose
#     APPEND_STDOUT                 - test environment     : for testing purpose
#
#   layout:
#     basar::PatternLayout          %D{%Y.%m.%d %H:%M:%S} [%5P] ${LOGNAME}${USERNAME} %-5p [%x] %c: %m%n
#                                             
#                                   ${USERNAME}            MS Windows login name
#                                   ${LOGNAME}             Solaris login name
#                                   %D{%Y.%m.%d %H:%M:%S}  date, time
#                                   %P                     process id
#                                   %t                     thread id
#                                   %p                     log level
#                                   %x                     context
#                                   %c                     logger name
#                                   %m                     logging message
#                                   %n                     linefeed
#                                   %l = %F:%L             file name, line number
#
#   environment variable:
#     using e.g.                    ${TEMP}, ${WSS}
#   
#
################################################################################

# === logger ===================================================================

# --- standard logging with rootLogger:

log4cplus.rootLogger=INFO, APPEND_STANDARD, APPEND_ERROR


# --- inspect with application logger:

log4cplus.logger.csc_batches = TRACE, APPEND_ERROR, APPEND_STANDARD, APPEND_INSPECT
log4cplus.additivity.csc_batches=false

log4cplus.logger.csc_batches.useCases= TRACE, APPEND_ERROR, APPEND_STANDARD, APPEND_INSPECT
log4cplus.additivity.csc_batches.useCases=false

log4cplus.logger.csc_batches.domMod= TRACE, APPEND_ERROR, APPEND_STANDARD, APPEND_INSPECT 
log4cplus.additivity.csc_batches.domMod=false

# === appender =================================================================

# --- for errors:

log4cplus.appender.APPEND_ERROR=log4cplus::RollingFileAppender
log4cplus.appender.APPEND_ERROR.Threshold=ERROR
log4cplus.appender.APPEND_ERROR.MaxFileSize=10MB
log4cplus.appender.APPEND_ERROR.MaxBackupIndex=4
log4cplus.appender.APPEND_ERROR.layout=log4cplus::PatternLayout
log4cplus.appender.APPEND_ERROR.layout.ConversionPattern=%D{%Y.%m.%d %H:%M:%S.%q} [%-5p] %c: %m%n
log4cplus.appender.APPEND_ERROR.File=${MARATHON_LOG_LOGSDIR}/cscbatchauto.error.${CSCBATCHAUTO_BRANCHNO}.log
log4cplus.appender.APPEND_ERROR.Append=true
log4cplus.appender.APPEND_ERROR.ImmediateFlush=true


# --- for standard messages:

log4cplus.appender.APPEND_STANDARD=log4cplus::RollingFileAppender
log4cplus.appender.APPEND_STANDARD.Threshold=INFO
log4cplus.appender.APPEND_STANDARD.MaxFileSize=10MB
log4cplus.appender.APPEND_STANDARD.MaxBackupIndex=4
log4cplus.appender.APPEND_STANDARD.layout=log4cplus::PatternLayout
log4cplus.appender.APPEND_STANDARD.layout.ConversionPattern=%D{%Y.%m.%d %H:%M:%S.%q} [%-5p] %c: %m%n
log4cplus.appender.APPEND_STANDARD.File=${MARATHON_LOG_LOGSDIR}/cscbatchauto.info.${CSCBATCHAUTO_BRANCHNO}.log
log4cplus.appender.APPEND_STANDARD.Append=true
log4cplus.appender.APPEND_STANDARD.ImmediateFlush=true
log4cplus.appender.APPEND_STANDARD.filters.1=log4cplus::spi::StringMatchFilter
log4cplus.appender.APPEND_STANDARD.filters.1.StringToMatch=[00]  SQLSTATE 01I01
log4cplus.appender.APPEND_STANDARD.filters.1.AcceptOnMatch=false


# --- for individually selected messages:

log4cplus.appender.APPEND_INSPECT=log4cplus::RollingFileAppender
log4cplus.appender.APPEND_INSPECT.Threshold=TRACE
log4cplus.appender.APPEND_INSPECT.MaxFileSize=10MB
log4cplus.appender.APPEND_INSPECT.MaxBackupIndex=4
log4cplus.appender.APPEND_INSPECT.layout=log4cplus::PatternLayout
log4cplus.appender.APPEND_INSPECT.layout.ConversionPattern=%D{%Y.%m.%d %H:%M:%S.%q} [%-5p] %c: %m%n
log4cplus.appender.APPEND_INSPECT.File=${MARATHON_LOG_LOGSDIR}/cscbatchauto.inspect.${CSCBATCHAUTO_BRANCHNO}.log
log4cplus.appender.APPEND_INSPECT.Append=true
log4cplus.appender.APPEND_INSPECT.ImmediateFlush=true

